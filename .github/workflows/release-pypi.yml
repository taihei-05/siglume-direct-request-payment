name: Release PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[test]" build twine
      - name: Assert tag and package versions
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import tomllib

          npm_version = json.loads(pathlib.Path("package.json").read_text(encoding="utf-8"))["version"]
          python_version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          tag = os.environ["GITHUB_REF_NAME"]
          if npm_version != python_version:
              raise SystemExit(f"package.json {npm_version} does not match pyproject.toml {python_version}.")
          if tag != f"v{python_version}":
              raise SystemExit(f"Tag {tag} does not match package version {python_version}.")
          PY
      - run: pytest python_tests
      - run: python -m build
      - run: python -m twine check dist/*.whl dist/*.tar.gz
      - name: Publish to PyPI with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - name: Verify PyPI registry artifact
        shell: bash
        run: |
          export PACKAGE_VERSION="$(python - <<'PY'
          import tomllib
          print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])
          PY
          )"
          for _ in {1..30}; do
            python - <<'PY' && exit 0 || true
          import json
          import os
          import urllib.request

          version = os.environ["PACKAGE_VERSION"]
          with urllib.request.urlopen(f"https://pypi.org/pypi/siglume-direct-request-payment/{version}/json", timeout=20) as response:
              payload = json.load(response)
          info = payload["info"]
          if info["version"] != version:
              raise SystemExit(f"PyPI version {info['version']} did not match {version}.")
          if "FastAPI sandbox verification currently requires Node.js/npm" not in (info.get("description") or ""):
              raise SystemExit("PyPI long description did not contain the expected FastAPI sandbox note.")
          PY
            sleep 5
          done
          echo "PyPI did not expose the expected artifact after waiting."
          exit 1
