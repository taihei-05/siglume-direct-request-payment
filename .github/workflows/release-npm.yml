name: Release npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: siglume
          POSTGRES_PASSWORD: siglume
          POSTGRES_DB: siglume_sdrp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U siglume -d siglume_sdrp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: siglume
          MYSQL_DATABASE: siglume_sdrp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psiglume"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      dynamodb:
        image: amazon/dynamodb-local:2.6.1
        ports:
          - 8000:8000
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SIGLUME_SDRP_POSTGRES_URL: postgresql://siglume:siglume@127.0.0.1:5432/siglume_sdrp
      SIGLUME_SDRP_MYSQL_URL: mysql://root:siglume@127.0.0.1:3306/siglume_sdrp
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      SIGLUME_SDRP_DYNAMODB_ENDPOINT: http://127.0.0.1:8000
      SIGLUME_SDRP_MONGODB_URL: mongodb://127.0.0.1:27017
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
      GOOGLE_CLOUD_PROJECT: siglume-sdrp-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: npm install -g npm@latest
      - run: node --version && npm --version
      - run: npm ci
      - name: Assert tag matches package version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi
      - run: npm run typecheck
      - run: npm run docs:check
      - run: npm test
      - run: npm run prisma:generate:test
      - run: npm run test:orm-matrix
        env:
          SIGLUME_SDRP_ORM_MATRIX: "1"
      - name: Start Firestore emulator
        shell: bash
        run: |
          docker run -d --name siglume-firestore -p 8080:8080 \
            gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators \
            gcloud beta emulators firestore start --host-port=0.0.0.0:8080 --project="${GOOGLE_CLOUD_PROJECT}"
          for _ in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/8080) >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs siglume-firestore
          exit 1
      - run: npm run test:nosql-matrix
        env:
          SIGLUME_SDRP_NOSQL_MATRIX: "1"
      - name: Check whether this npm version already exists
        id: npm_version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "package_name=${PACKAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "package_version=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Publish with npm Trusted Publishing
        if: steps.npm_version.outputs.exists != 'true'
        run: npm publish --access public --provenance
      - name: Skip publish because version already exists
        if: steps.npm_version.outputs.exists == 'true'
        run: echo "${{ steps.npm_version.outputs.package_name }}@${{ steps.npm_version.outputs.package_version }} is already published."
      - name: Verify npm registry artifact
        shell: bash
        run: |
          PACKAGE_NAME="${{ steps.npm_version.outputs.package_name }}"
          PACKAGE_VERSION="${{ steps.npm_version.outputs.package_version }}"
          export EXPECTED_GIT_HEAD="$(git rev-parse HEAD)"
          for _ in {1..30}; do
            node <<'NODE' && exit 0 || true
          const { execFileSync } = require("node:child_process");
          const packageName = process.env.PACKAGE_NAME;
          const packageVersion = process.env.PACKAGE_VERSION;
          const expectedGitHead = process.env.EXPECTED_GIT_HEAD;
          const metadata = JSON.parse(execFileSync("npm", ["view", `${packageName}@${packageVersion}`, "version", "gitHead", "readme", "--json"], { encoding: "utf8" }));
          if (metadata.version !== packageVersion) {
            throw new Error(`npm version ${metadata.version} did not match ${packageVersion}`);
          }
          if (metadata.gitHead && metadata.gitHead !== expectedGitHead) {
            throw new Error(`npm gitHead ${metadata.gitHead} did not match ${expectedGitHead}`);
          }
          if (!String(metadata.readme || "").includes("FastAPI sandbox verification currently requires Node.js/npm")) {
            throw new Error("npm README did not contain the expected FastAPI sandbox note");
          }
          NODE
            sleep 5
          done
          echo "npm registry did not expose the expected artifact after waiting."
          exit 1
        env:
          PACKAGE_NAME: ${{ steps.npm_version.outputs.package_name }}
          PACKAGE_VERSION: ${{ steps.npm_version.outputs.package_version }}
