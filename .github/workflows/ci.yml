name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run docs:check
      - run: npm test
      - run: npm run build
      - run: node bin/siglume-sdrp.mjs preflight --no-api --merchant example_merchant --origin https://shop.example.com --webhook-url https://api.example.com/payments/webhooks/siglume
        env:
          SIGLUME_MERCHANT_AUTH_TOKEN: test_merchant_token
          SIGLUME_WEBHOOK_SECRET: whsec_test
      - run: node bin/siglume-sdrp.mjs init express --target /tmp/siglume-sdrp-express
      - run: node bin/siglume-sdrp.mjs init fastapi --target /tmp/siglume-sdrp-fastapi
      - run: npm install --no-package-lock
        working-directory: examples/hosted-checkout-typescript
      - run: npm run typecheck
        working-directory: examples/hosted-checkout-typescript
      - run: npm publish --dry-run --access public

  orm-matrix:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: siglume
          POSTGRES_PASSWORD: siglume
          POSTGRES_DB: siglume_sdrp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U siglume -d siglume_sdrp"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: siglume
          MYSQL_DATABASE: siglume_sdrp
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psiglume"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      SIGLUME_SDRP_POSTGRES_URL: postgresql://siglume:siglume@127.0.0.1:5432/siglume_sdrp
      SIGLUME_SDRP_MYSQL_URL: mysql://root:siglume@127.0.0.1:3306/siglume_sdrp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate:test
      - run: npm run test:orm-matrix
        env:
          SIGLUME_SDRP_ORM_MATRIX: "1"

  nosql-matrix:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local:2.6.1
        ports:
          - 8000:8000
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      SIGLUME_SDRP_DYNAMODB_ENDPOINT: http://127.0.0.1:8000
      SIGLUME_SDRP_MONGODB_URL: mongodb://127.0.0.1:27017
      FIRESTORE_EMULATOR_HOST: 127.0.0.1:8080
      GOOGLE_CLOUD_PROJECT: siglume-sdrp-test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Start Firestore emulator
        shell: bash
        run: |
          docker run -d --name siglume-firestore -p 8080:8080 \
            gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators \
            gcloud beta emulators firestore start --host-port=0.0.0.0:8080 --project="${GOOGLE_CLOUD_PROJECT}"
          for _ in {1..30}; do
            if (echo > /dev/tcp/127.0.0.1/8080) >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          docker logs siglume-firestore
          exit 1
      - run: npm run test:nosql-matrix
        env:
          SIGLUME_SDRP_NOSQL_MATRIX: "1"

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[test]" build twine
      - run: pytest python_tests
      - run: python -m siglume_direct_request_payment._cli preflight --no-api --merchant example_merchant --origin https://shop.example.com --webhook-url https://api.example.com/payments/webhooks/siglume
        env:
          SIGLUME_MERCHANT_AUTH_TOKEN: test_merchant_token
          SIGLUME_WEBHOOK_SECRET: whsec_test
      - run: python -m siglume_direct_request_payment._cli init fastapi --target /tmp/siglume-sdrp-fastapi-py
      - run: python -m py_compile examples/hosted-checkout-python/app.py examples/hosted-checkout-python/order_store.py
      - run: python -m build
      - run: python -m twine check dist/*.whl dist/*.tar.gz
